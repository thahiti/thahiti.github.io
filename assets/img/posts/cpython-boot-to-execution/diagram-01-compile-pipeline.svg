<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bgp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eef2f7"/>
    </linearGradient>
    <filter id="shadowp" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowp" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="320" fill="url(#bgp)" rx="12"/>

  <text x="450" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">소스에서 code 객체까지 — 컴파일 파이프라인</text>

  <!-- Step 1: Source -->
  <g filter="url(#shadowp)">
    <rect x="30" y="95" width="140" height="110" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="100" y="132" text-anchor="middle" font-size="26">&#x1F4C4;</text>
  <text x="100" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">소스 텍스트</text>
  <text x="100" y="182" text-anchor="middle" font-size="10" fill="#64748b">app.py</text>
  <line x1="172" y1="150" x2="203" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowp)"/>

  <!-- Step 2: Tokenizer -->
  <g filter="url(#shadowp)">
    <rect x="205" y="95" width="140" height="110" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <text x="275" y="132" text-anchor="middle" font-size="26">&#x2702;&#xFE0F;</text>
  <text x="275" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">Tokenizer</text>
  <text x="275" y="182" text-anchor="middle" font-size="10" fill="#64748b">토큰 열 (NAME, OP)</text>
  <line x1="347" y1="150" x2="378" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowp)"/>

  <!-- Step 3: Parser -->
  <g filter="url(#shadowp)">
    <rect x="380" y="95" width="140" height="110" rx="10" fill="#fff" stroke="#14b8a6" stroke-width="2"/>
  </g>
  <text x="450" y="132" text-anchor="middle" font-size="26">&#x1F333;</text>
  <text x="450" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">Parser</text>
  <text x="450" y="182" text-anchor="middle" font-size="10" fill="#64748b">AST</text>
  <line x1="522" y1="150" x2="553" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowp)"/>

  <!-- Step 4: Symtable -->
  <g filter="url(#shadowp)">
    <rect x="555" y="95" width="140" height="110" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="625" y="132" text-anchor="middle" font-size="26">&#x1F5C2;&#xFE0F;</text>
  <text x="625" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Symtable</text>
  <text x="625" y="182" text-anchor="middle" font-size="10" fill="#64748b">local/global 분류</text>
  <line x1="697" y1="150" x2="728" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowp)"/>

  <!-- Step 5: Compiler -->
  <g filter="url(#shadowp)">
    <rect x="730" y="95" width="140" height="110" rx="10" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  </g>
  <text x="800" y="132" text-anchor="middle" font-size="26">&#x2699;&#xFE0F;</text>
  <text x="800" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Compiler</text>
  <text x="800" y="182" text-anchor="middle" font-size="10" fill="#64748b">code 객체</text>

  <!-- Bottom annotations -->
  <text x="378" y="252" text-anchor="middle" font-size="11" fill="#475569">SyntaxError는 여기까지에서 잡힌다</text>
  <line x1="378" y1="210" x2="450" y2="238" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="625" y="278" text-anchor="middle" font-size="11" fill="#475569">변수가 local이냐 global이냐는 이 단계(컴파일 시점)에 확정된다</text>
  <line x1="625" y1="210" x2="625" y2="264" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
