<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eef2f7"/>
    </linearGradient>
    <filter id="sh4" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">셀 병합(Merge)이 AI 직렬화에 미치는 영향</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="470" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- ===== LEFT: Merged Table ===== -->
  <text x="225" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">&#x274C; 셀 병합된 표</text>

  <!-- Table header -->
  <g filter="url(#sh4)">
    <rect x="50" y="85" width="350" height="145" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="50" y="85" width="110" height="30" rx="0" fill="#334155"/>
  <rect x="160" y="85" width="120" height="30" fill="#334155"/>
  <rect x="280" y="85" width="120" height="30" fill="#334155"/>
  <!-- round top-right corner -->
  <rect x="50" y="85" width="350" height="30" rx="6" fill="#334155"/>
  <rect x="50" y="95" width="350" height="20" fill="#334155"/>
  <text x="105" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">카테고리</text>
  <text x="220" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">항목</text>
  <text x="340" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">가격</text>

  <!-- Merged cell "과일" spanning 3 rows -->
  <rect x="50" y="115" width="110" height="115" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="105" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">과일</text>
  <text x="105" y="195" text-anchor="middle" font-size="9" fill="#ef4444">(3행 병합)</text>

  <!-- Row 1 -->
  <rect x="160" y="115" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="280" y="115" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="220" y="139" text-anchor="middle" font-size="12" fill="#1f2937">사과</text>
  <text x="340" y="139" text-anchor="middle" font-size="12" fill="#1f2937">1,000원</text>

  <!-- Row 2 -->
  <rect x="160" y="153" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="280" y="153" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="220" y="177" text-anchor="middle" font-size="12" fill="#1f2937">바나나</text>
  <text x="340" y="177" text-anchor="middle" font-size="12" fill="#1f2937">2,000원</text>

  <!-- Row 3 -->
  <rect x="160" y="191" width="120" height="39" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="280" y="191" width="120" height="39" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="220" y="215" text-anchor="middle" font-size="12" fill="#1f2937">포도</text>
  <text x="340" y="215" text-anchor="middle" font-size="12" fill="#1f2937">3,000원</text>

  <!-- Arrow down -->
  <text x="225" y="260" text-anchor="middle" font-size="13" fill="#94a3b8">&#x2193; AI 직렬화 &#x2193;</text>

  <!-- Serialized result (left) -->
  <g filter="url(#sh4)">
    <rect x="30" y="275" width="390" height="135" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  </g>
  <text x="45" y="298" font-size="11" font-weight="600" fill="#dc2626">AI가 읽은 결과:</text>

  <rect x="45" y="308" width="360" height="28" rx="4" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="55" y="326" font-size="10" fill="#1f2937">Row 1: 카테고리=<tspan fill="#059669" font-weight="700">과일</tspan> | 항목=사과 | 가격=1,000원</text>

  <rect x="45" y="342" width="360" height="28" rx="4" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="55" y="360" font-size="10" fill="#1f2937">Row 2: 카테고리=<tspan fill="#dc2626" font-weight="700">(빈칸??)</tspan> | 항목=바나나 | 가격=2,000원</text>

  <rect x="45" y="376" width="360" height="28" rx="4" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <text x="55" y="394" font-size="10" fill="#1f2937">Row 3: 카테고리=<tspan fill="#dc2626" font-weight="700">(빈칸??)</tspan> | 항목=포도 | 가격=3,000원</text>

  <!-- Error callout -->
  <g filter="url(#sh4)">
    <rect x="30" y="425" width="390" height="50" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <text x="50" y="448" font-size="11" font-weight="600" fill="#dc2626">&#x26A0; 결과:</text>
  <text x="110" y="448" font-size="11" fill="#7f1d1d">"바나나는 어떤 카테고리?"</text>
  <text x="50" y="465" font-size="11" fill="#7f1d1d">&#x2192; AI: "카테고리 정보가 없습니다" (환각 또는 오답 발생)</text>

  <!-- ===== RIGHT: Flat Table ===== -->
  <text x="675" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">&#x2714; 플랫(Flat)한 표</text>

  <!-- Table header -->
  <g filter="url(#sh4)">
    <rect x="500" y="85" width="350" height="145" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="500" y="85" width="350" height="30" rx="6" fill="#334155"/>
  <rect x="500" y="95" width="350" height="20" fill="#334155"/>
  <text x="555" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">카테고리</text>
  <text x="670" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">항목</text>
  <text x="790" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">가격</text>

  <!-- Row 1 -->
  <rect x="500" y="115" width="110" height="38" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="0.5"/>
  <rect x="610" y="115" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="730" y="115" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="555" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">과일</text>
  <text x="670" y="139" text-anchor="middle" font-size="12" fill="#1f2937">사과</text>
  <text x="790" y="139" text-anchor="middle" font-size="12" fill="#1f2937">1,000원</text>

  <!-- Row 2 -->
  <rect x="500" y="153" width="110" height="38" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="0.5"/>
  <rect x="610" y="153" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="730" y="153" width="120" height="38" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="555" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">과일</text>
  <text x="670" y="177" text-anchor="middle" font-size="12" fill="#1f2937">바나나</text>
  <text x="790" y="177" text-anchor="middle" font-size="12" fill="#1f2937">2,000원</text>

  <!-- Row 3 -->
  <rect x="500" y="191" width="110" height="39" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="0.5"/>
  <rect x="610" y="191" width="120" height="39" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="730" y="191" width="120" height="39" fill="#fff" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="555" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">과일</text>
  <text x="670" y="215" text-anchor="middle" font-size="12" fill="#1f2937">포도</text>
  <text x="790" y="215" text-anchor="middle" font-size="12" fill="#1f2937">3,000원</text>

  <!-- Arrow down -->
  <text x="675" y="260" text-anchor="middle" font-size="13" fill="#94a3b8">&#x2193; AI 직렬화 &#x2193;</text>

  <!-- Serialized result (right) -->
  <g filter="url(#sh4)">
    <rect x="480" y="275" width="390" height="135" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <text x="495" y="298" font-size="11" font-weight="600" fill="#059669">AI가 읽은 결과:</text>

  <rect x="495" y="308" width="360" height="28" rx="4" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="505" y="326" font-size="10" fill="#1f2937">Row 1: 카테고리=<tspan fill="#059669" font-weight="700">과일</tspan> | 항목=사과 | 가격=1,000원</text>

  <rect x="495" y="342" width="360" height="28" rx="4" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="505" y="360" font-size="10" fill="#1f2937">Row 2: 카테고리=<tspan fill="#059669" font-weight="700">과일</tspan> | 항목=바나나 | 가격=2,000원</text>

  <rect x="495" y="376" width="360" height="28" rx="4" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="505" y="394" font-size="10" fill="#1f2937">Row 3: 카테고리=<tspan fill="#059669" font-weight="700">과일</tspan> | 항목=포도 | 가격=3,000원</text>

  <!-- Success callout -->
  <g filter="url(#sh4)">
    <rect x="480" y="425" width="390" height="50" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="500" y="448" font-size="11" font-weight="600" fill="#059669">&#x2714; 결과:</text>
  <text x="558" y="448" font-size="11" fill="#14532d">"바나나는 어떤 카테고리?"</text>
  <text x="500" y="465" font-size="11" fill="#14532d">&#x2192; AI: "바나나의 카테고리는 과일입니다" (정확한 답변)</text>
</svg>